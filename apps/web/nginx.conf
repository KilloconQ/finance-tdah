server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback — todas las rutas no encontradas devuelven index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cachear assets con hash
  location ~* \.(?:js|css|woff2?|svg|png|jpg|jpeg|webp|avif)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # HTML siempre fresco
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  # Health
  location = /health {
    access_log off;
    return 200 "ok";
  }
}
