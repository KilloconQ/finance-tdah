name: finance-tdah

services:
  postgres:
    image: postgres:17-alpine
    container_name: ft-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-finance}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD requerido}
      POSTGRES_DB: ${POSTGRES_DB:-finance_tdah}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-finance} -d ${POSTGRES_DB:-finance_tdah}']
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ft-internal

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: ft-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgres://${POSTGRES_USER:-finance}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-finance_tdah}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET requerido}
      BETTER_AUTH_URL: ${PUBLIC_URL:-https://finance.local}
      WEB_ORIGIN: ${PUBLIC_URL:-https://finance.local}
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3001/health']
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    networks:
      - ft-internal

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: /api
    container_name: ft-web
    restart: unless-stopped
    networks:
      - ft-internal

  caddy:
    image: caddy:2-alpine
    container_name: ft-caddy
    restart: unless-stopped
    depends_on:
      - api
      - web
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - ft-internal

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: ft-cloudflared
    restart: unless-stopped
    depends_on:
      - caddy
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:?CLOUDFLARE_TUNNEL_TOKEN requerido}
    networks:
      - ft-internal

networks:
  ft-internal:
    driver: bridge

volumes:
  postgres-data:
  caddy-data:
  caddy-config:
